<!doctype html><html lang="en"><head><meta charset="utf-8">
<style>
/* Clean reproduction of the ChatGPT desktop "Add marketplace" dialog for the guide.
   Neutral data only. Grounded in the verified desktop flow: Source field takes a
   GitHub owner/repo, toast "claude-lamora marketplace added". */
* { margin:0; padding:0; box-sizing:border-box; }
:root{ --ink:#0d0d0d; --muted:#8f8f8f; --faint:#b4b4b4; --line:#ececec; --sb:#f9f9f9; --accent:#cc7a58; }
html,body{ width:1120px; height:720px; background:#fff;
  font-family:ui-sans-serif,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;
  color:var(--ink); -webkit-font-smoothing:antialiased; }
.app{ display:flex; width:1120px; height:720px; position:relative; overflow:hidden; }
.sb{ width:246px; flex:none; background:var(--sb); border-right:1px solid var(--line); padding:14px 12px; display:flex; flex-direction:column; }
.brand{ font-weight:600; font-size:15px; padding:6px 8px 14px; }
.nav{ display:flex; align-items:center; gap:11px; padding:8px 10px; border-radius:8px; font-size:14px; color:#2d2d2d; }
.nav.on{ background:#ececec; font-weight:600; }
.nav .ic{ width:17px; height:17px; opacity:.7; }
.spacer{ flex:1; }
.acct{ display:flex; align-items:center; gap:10px; padding:9px 8px; border-top:1px solid var(--line); }
.acct .av{ width:26px; height:26px; border-radius:7px; background:#e6e6e6; display:grid; place-items:center; font-size:11px; color:#6b6b6b; font-weight:700; }
.acct .who b{ font-size:13.5px; } .acct .who span{ display:block; font-size:11.5px; color:var(--muted); }
.main{ flex:1; position:relative; padding:22px 34px; }
.toggle{ position:absolute; top:18px; left:50%; transform:translateX(-50%); background:#f2f2f2; border-radius:999px; padding:4px; display:flex; gap:2px; }
.toggle span{ font-size:14px; padding:6px 18px; border-radius:999px; color:#5c5c5c; }
.toggle span.on{ background:#fff; color:var(--ink); font-weight:600; box-shadow:0 1px 3px rgba(0,0,0,.08); }
.h1{ font-size:30px; font-weight:600; margin-top:52px; }
.sub{ font-size:14.5px; color:var(--muted); margin-top:6px; }

.toast{ position:absolute; top:22px; right:26px; background:#fff; border:1px solid var(--line); border-radius:12px;
  box-shadow:0 14px 34px rgba(0,0,0,.14); display:flex; align-items:center; gap:10px; padding:12px 15px; font-size:14px; z-index:12; }
.toast .dot{ width:18px;height:18px;border-radius:50%;background:#1a7f37;display:grid;place-items:center; }

.backdrop{ position:absolute; inset:0; background:rgba(255,255,255,.62); z-index:10; }
.modal{ position:absolute; top:50%; left:calc(50% + 123px); transform:translate(-50%,-50%);
  width:500px; background:#fff; border:1px solid var(--line); border-radius:20px; box-shadow:0 30px 80px rgba(0,0,0,.18); padding:24px 26px 22px; z-index:11; }
.modal .top{ display:flex; align-items:center; justify-content:space-between; }
.modal h2{ font-size:21px; font-weight:600; }
.modal .x{ color:var(--faint); font-size:20px; }
.lbl{ font-size:12.5px; color:var(--muted); margin-top:20px; }
.field{ margin-top:7px; height:48px; border:1px solid var(--line); border-radius:12px; display:flex; align-items:center; padding:0 14px; font-family:ui-monospace,Menlo,monospace; font-size:15px; position:relative; }
.hint{ font-size:12px; color:var(--faint); margin-top:8px; }
.hint code{ background:#f2f2f2; border-radius:4px; padding:1px 5px; }
.foot{ display:flex; justify-content:flex-end; gap:10px; margin-top:22px; }
.btn{ height:40px; padding:0 18px; border-radius:10px; font-size:14px; font-weight:600; display:inline-flex; align-items:center; }
.btn.ghost{ border:1px solid var(--line); color:#2d2d2d; background:#fff; }
.btn.dark{ background:#0d0d0d; color:#fff; position:relative; }
.badge{ position:absolute; width:30px; height:30px; border-radius:50%; background:var(--accent); color:#fff; font-weight:700; font-size:15px; display:grid; place-items:center; box-shadow:0 3px 8px rgba(0,0,0,.18); z-index:20; }
.ring{ position:absolute; border:2.5px solid var(--accent); border-radius:12px; z-index:19; box-shadow:0 0 0 4px rgba(204,122,88,.15); }
</style></head>
<body><div class="app">
  <aside class="sb">
    <div class="brand">ChatGPT</div>
    <div class="nav"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 20h9M4 20l1-4L16 5a2 2 0 0 1 3 3L8 19l-4 1z"/></svg>New chat</div>
    <div class="nav"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 7h6l2 2h10v9a2 2 0 0 1-2 2H3z"/></svg>Projects</div>
    <div class="nav"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M8 3v4M16 3v4M4 10h16"/></svg>Scheduled</div>
    <div class="nav"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 5h11v15H4zM15 5h5v15h-5"/></svg>Library</div>
    <div class="nav on"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="8.5"/><path d="M12 3.5c3 3 3 14 0 17M12 3.5c-3 3-3 14 0 17M3.6 12h16.8"/></svg>Plugins</div>
    <div class="nav"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="5" y="7" width="14" height="12" rx="2"/><path d="M9 7V5a3 3 0 0 1 6 0v2"/></svg>Agents</div>
    <div class="spacer"></div>
    <div class="acct"><div class="av">✦</div><div class="who"><b>החשבון שלכם.ן</b><span>Business</span></div></div>
  </aside>
  <section class="main">
    <div class="toggle"><span class="on">Plugins</span><span>Skills</span></div>
    <div class="h1">Plugins</div>
    <div class="sub">Work with ChatGPT across your favorite tools.</div>
  </section>

  <div class="backdrop"></div>
  <div class="modal">
    <div class="top"><h2>Add marketplace</h2><div class="x">✕</div></div>
    <div class="lbl">Source</div>
    <div class="field">yaniv-golan/claude-lamora
      <span class="ring" style="inset:-3px"></span>
      <span class="badge" style="top:-14px; left:-13px">3</span>
    </div>
    <div class="hint">A GitHub <code>owner/repo</code> or a git repository URL.</div>
    <div class="foot">
      <span class="btn ghost">Cancel</span>
      <span class="btn dark">Add
        <span class="ring" style="inset:-4px"></span><span class="badge" style="top:-14px; left:-11px">4</span>
      </span>
    </div>
  </div>
</div></body></html>
