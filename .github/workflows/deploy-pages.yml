name: deploy-pages

on:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir -p _site/static _site/images
          # Friendly Hebrew landing page at the site root.
          cp site/index.html _site/
          # Screenshots + demo GIF referenced by the landing page.
          cp docs/images/*.png docs/images/*.gif _site/images/
          # One-click "Install in Claude Desktop" deep-link page.
          cp static/install-claude-desktop.html _site/static/

      - uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages

      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
